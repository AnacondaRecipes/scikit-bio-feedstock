{% set name = "scikit-bio" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scikit_bio-{{ version }}.tar.gz
  sha256: 771093ebfd154f02b9d88dcf81997737ce804e384bb3ab1cd389dfc60d566d11

build:
  skip: true  # [ win32 or linux32 or py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - patch     # [not win]
    - m2-patch  # [win]
  host:
    - python
    - pip
    - cython
    - numpy  {{ numpy }}       # [(osx and arm64) or py>39]
    - llvm-openmp
  run:
    - python
    - decorator >=3.4.2
    - natsort >=4.0.3
    - pandas >=1.5.0
    - scipy >=1.9.0
    - requests >= 2.20.0
    - h5py >= 3.6.0
    - biom-format >= 2.1.16
    - statsmodels >= 0.14.0
    - patsy >= 0.5.0
    - array-api-compat >= 1.3
    - llvm-openmp

test:
  imports:
    - skbio
    - skbio.alignment
    - skbio.alignment.tests
    - skbio.diversity
    - skbio.diversity.alpha
    - skbio.diversity.alpha.tests
    - skbio.diversity.beta
    - skbio.diversity.beta.tests
    - skbio.diversity.tests
    - skbio.io
    - skbio.io.format
    - skbio.io.format.tests
    - skbio.io.tests
    - skbio.sequence
    - skbio.sequence.tests
    - skbio.stats
    - skbio.stats.distance
    - skbio.stats.distance.tests
    - skbio.stats.evolve
    - skbio.stats.evolve.tests
    - skbio.stats.ordination
    - skbio.stats.ordination.tests
    - skbio.stats.tests
    - skbio.tests
    - skbio.tree
    - skbio.tree.tests
    - skbio.util
    - skbio.util.tests
  requires:
    - pip
    - pytest
    - responses
    - matplotlib
    - biom-format
    - array-api-compat
  commands:
    - pip check
    - python -c "from importlib.metadata import version as v; assert v('scikit-bio')=='{{ version }}'"
    - MPLBACKEND='Agg' python -m skbio.test

about:
  home: https://scikit-bio.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Data structures, algorithms and educational resources for bioinformatics.
  description: |
    scikit-bio is an open-source, BSD-licensed, python package providing data
    structures, algorithms, and educational resources for bioinformatics.
  doc_url: https://scikit-bio.org
  doc_source_url: https://github.com/biocore/scikit-bio/blob/master/doc/source/index.rst
  dev_url: https://github.com/biocore/scikit-bio

extra:
  recipe-maintainers:
    - ebolyen
    - wasade
    - mortonjt
    - thermokarst
    - ElDeveloper
    - chenghlee
