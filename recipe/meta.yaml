{% set name = "scikit-bio" %}
{% set version = "0.7.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scikit_bio-{{ version }}.tar.gz
  sha256: d0a991818882c88ca47d9f6441321a440439e1a8a6716a101a931d590c395fe8

build:
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    - cython
    - numpy {{ numpy }}
  run:
    - python
    - requests >=2.20.0
    - decorator >=3.4.2
    - natsort >=4.0.3
    - numpy >=2
    - pandas >=1.5.0
    - scipy >=1.9.0
    - h5py >=3.6.0
    - biom-format >=2.1.16
    - statsmodels >=0.14.0
    - patsy >=0.5.0
    - array-api-compat >=1.3
    - llvm-openmp  # [osx]
    - _openmp_mutex  # [linux]

test:
  imports:
    - skbio
    - skbio.alignment
    - skbio.alignment.tests
    - skbio.diversity
    - skbio.diversity.alpha
    - skbio.diversity.alpha.tests
    - skbio.diversity.beta
    - skbio.diversity.beta.tests
    - skbio.diversity.tests
    - skbio.io
    - skbio.io.format
    - skbio.io.format.tests
    - skbio.io.tests
    - skbio.sequence
    - skbio.sequence.tests
    - skbio.stats
    - skbio.stats.distance
    - skbio.stats.distance.tests
    - skbio.stats.evolve
    - skbio.stats.evolve.tests
    - skbio.stats.ordination
    - skbio.stats.ordination.tests
    - skbio.stats.tests
    - skbio.tests
    - skbio.tree
    - skbio.tree.tests
    - skbio.util
    - skbio.util.tests
  requires:
    - pip
    - pytest
    - responses
    - matplotlib
    - biom-format  # [py<314]
    - array-api-compat
  script_env:
    - MPLBACKEND=Agg
  commands:
    - pip check
    - python -c "from importlib.metadata import version as v; assert v('{{ name }}')=='{{ version }}'"
    - python -m skbio.test

about:
  home: https://scikit.bio
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Data structures, algorithms and educational resources for bioinformatics.
  description: |
    scikit-bio is an open-source, BSD-licensed, python package providing data
    structures, algorithms, and educational resources for bioinformatics.
  doc_url: https://scikit-bio.org
  doc_source_url: https://scikit.bio/docs
  dev_url: https://github.com/scikit-bio/scikit-bio

extra:
  recipe-maintainers:
    - ebolyen
    - wasade
    - mortonjt
    - thermokarst
    - ElDeveloper
    - chenghlee
